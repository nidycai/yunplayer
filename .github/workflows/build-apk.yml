name: Build YunPlayer Native APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle Wrapper
        run: |
          set -e
          curl -fsSL -o /tmp/gradle-8.2-bin.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q /tmp/gradle-8.2-bin.zip -d /tmp
          /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/

      - name: Build Debug APK
        run: |
          set -euo pipefail
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon --info 2>&1 | tee build.log
          echo "===== KOTLIN ERRORS (e:) ====="
          grep -E "^e: |^.*\.kt:[0-9]+:[0-9]+ " build.log | head -n 80 || true
          if grep -q "BUILD FAILED" build.log; then
            echo "===== TAIL ====="
            tail -n 150 build.log
            exit 1
          fi
          find app/build/outputs -name "*.apk" -print

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yunplayer-native-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
