name: Build YunPlayer Native APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle Wrapper
        run: |
          set -e
          curl -fsSL -o /tmp/gradle-8.2-bin.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q /tmp/gradle-8.2-bin.zip -d /tmp
          /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # 确保 wrapper jar 存在
          ls -la gradlew gradle/wrapper/

      - name: Build Debug APK
        run: |
          set -e
          ./gradlew assembleDebug --stacktrace --no-daemon
          echo "---- APK files ----"
          find app/build/outputs -name "*.apk" -print || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yunplayer-native-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
